# ============================================================
# EduPilot – Render Blueprint (render.yaml)
# Deploy with: https://render.com/deploy
# ============================================================

databases:
  - name: edupilot-db
    plan: free
    databaseName: edupilot
    user: edupilot_user

services:
  - type: web
    name: edupilot
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edupilot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: IBM_API_KEY
        sync: false
      - key: IBM_PROJECT_ID
        sync: false
      - key: IBM_REGION
        value: us-south
      - key: WATSONX_MODEL_ID
        value: ibm/granite-3-8b-instruct
      - key: APP_NAME
        value: EduPilot
      - key: MAX_CHAT_HISTORY
        value: "50"
      - key: MAX_TOKENS
        value: "2048"
      - key: TEMPERATURE
        value: "0.7"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
